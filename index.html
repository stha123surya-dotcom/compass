<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Vastu Compass</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Vastu Digital Compass</h1>
            <div class="divider"></div>
        </header>

        <div class="selection-panel">
            <label for="roomSelect">Select Room/Element:</label>
            <select id="roomSelect">
                <option value="entrance">Main Entrance</option>
                <option value="pooja">Pooja Room</option>
                <option value="kitchen">Kitchen</option>
                <option value="bedroom">Master Bedroom</option>
                <option value="living">Living Room</option>
                <option value="dining">Dining Room</option>
                <option value="store">Store Room</option>
                <option value="parking">Parking / Porch</option>
                <option value="staircase">Staircase</option>
                <option value="servant">Servant Quarter</option>
                <option value="overhead">Overhead Tank</option>
                <option value="underground">Underground Tank</option>
                <option value="septic">Septic Tank</option>
                <option value="lift">Lift</option>
                <option value="toilet">Toilet/Bathroom</option>
            </select>
        </div>

        <div class="compass-wrapper">
            <!-- Segment Highlighter Ring -->
            <div id="statusRing" class="status-ring"></div>
            
            <div class="compass-dial" id="compass">
                <div class="indicator"></div>
                <div class="marking n">N</div>
                <div class="marking ne">NE</div>
                <div class="marking e">E</div>
                <div class="marking se">SE</div>
                <div class="marking s">S</div>
                <div class="marking sw">SW</div>
                <div class="marking w">W</div>
                <div class="marking nw">NW</div>
            </div>
        </div>

        <div class="info-card">
            <h2 id="directionText">North</h2>
            <p id="degreeText">0°</p>
            <div id="suggestionBox" class="suggestion-box">
                Tap 'Start' to begin Vastu analysis.
            </div>
        </div>

        <button id="startBtn">Enable Compass</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
