<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vastu Compass - 8 Division</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1 class="title">Vastu Compass (8 Directions)</h1>

  <div class="compass-container">
    <div id="compassDial">
      <div id="needle"></div>
      <div class="dir-label n">N</div>
      <div class="dir-label ne">NE</div>
      <div class="dir-label e">E</div>
      <div class="dir-label se">SE</div>
      <div class="dir-label s">S</div>
      <div class="dir-label sw">SW</div>
      <div class="dir-label w">W</div>
      <div class="dir-label nw">NW</div>
    </div>
  </div>

  <div id="directionText" class="direction-text"></div>
  <div id="vastuResult" class="vastu-result"></div>

  <script src="script.js"></script>
  <div id="suggestionBox" class="suggestion-box">
    <h2>Direction Insights</h2>
    <p id="suggestionText">Rotate your device to see Vastu suggestions.</p>
  </div>
</body>
</html>
