<!DOCTYPE html>
<html>
<head>
  <title>Attendance Log</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; padding: 15px; background: #f2f2f2; }
    h2 { text-align: center; }
    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      background: #28a745;
      color: white;
      font-size: 16px;
      border: none;
    }
  </style>
</head>
<body>

<h2>📋 Attendance Log</h2>

<input id="teacher" placeholder="Teacher Name">

<select id="class">
  <option>Class 1</option>
  <option>Class 2</option>
  <option>Class 3</option>
</select>

<input id="subject" placeholder="Subject">
<input type="date" id="date">

<input type="number" id="total" placeholder="Total Students">
<input type="number" id="present" placeholder="Present Students">

<input id="remarks" placeholder="Remarks">

<button onclick="submitForm()">Submit</button>

<script>
function submitForm() {
  var data = {
    teacher: document.getElementById("teacher").value,
    class: document.getElementById("class").value,
    subject: document.getElementById("subject").value,
    date: document.getElementById("date").value,
    total: document.getElementById("total").value,
    present: document.getElementById("present").value,
    remarks: document.getElementById("remarks").value
  };

fetch("https://script.google.com/macros/s/AKfycbxDKmZkWc6mbxOyu-tDIPSnXeCuXXKIUJji0md4SZv_yprS4PIRBsThOJO3s0hFH_fHsQ/exec", {
  method: "POST",
  mode: 'no-cors',
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify(data)
})
.then(res => res.json())
.then(response => {
  if (response.status === "success") {
    alert("✅ Attendance Submitted");
    location.reload();
  } else {
    alert("❌ Server Error");
  }
})
.catch(error => {
  alert("❌ Network Error");
  console.error(error);
});
}
</script>

</body>
</html>
